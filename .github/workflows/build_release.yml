name: build_release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - '.github/workflows/build_release.yml'

permissions:
  contents: read

jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify GKD dist files
        run: |
          test -f dist/gkd.json5
          test -f dist/gkd.version.json5
          echo 'gkd.version.json5:'
          cat dist/gkd.version.json5
          echo 'gkd.json5 head:'
          head -c 500 dist/gkd.json5
          echo
