name: build_release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build_release.yml'

permissions:
  contents: write

concurrency:
  group: gkd-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.31.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check subscription
        run: pnpm run check

      - name: Build subscription
        run: pnpm run build

      - name: Verify output
        run: |
          test -s dist/gkd.json5
          test -s dist/gkd.version.json5
          cat dist/gkd.version.json5

      - name: Commit generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist README.md CHANGELOG.md
          if git diff --cached --quiet; then
            echo 'No generated changes'
          else
            git commit -m 'chore: update GKD dist'
            git push
          fi
